<div class="modal-backdrop-custom" [ngClass]="{'backdrop-closing' : closing}">
    <div class="modal-backdrop-custom">
        <div class="modal-custom">
            <div class="modal-header-custom">
                <h5>{{ esEdicion ? 'Editar Usuario #'+ usuario.id : 'Nuevo Usuario' }}</h5>
                <button class="btn-close-custom" (click)="cerrarModal()">x</button>
            </div>
            <div class="modal-body-custom">
                <div class="mb-3">
                    <label>Nombre</label>
                    <input type="text" class="form-control" [(ngModel)]="usuario.nombre">
                </div>
                <div class="mb-3">
                    <label>Apellido</label>
                    <input type="text" class="form-control" [(ngModel)]="usuario.apellido">
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" class="form-control" [(ngModel)]="usuario.password">
                </div>
                <div class="mb-3">
                    <label>Estado</label>
                    <select class="form-control" [(ngModel)]="usuario.estado">
                        <option [ngValue]="true">Activo</option>
                        <option [ngValue]="false">Inactivo</option>
                    </select>
                </div>
            </div>

            <div class="modal-footer-custom">
                <button class="btn btn-secondary" (click)="cerrarModal()">Cancelar</button>
                <button class="btn btn-primary" (click)="GuardarUsuario()">Guardar</button>
            </div>
        </div>
    </div>

</div>
