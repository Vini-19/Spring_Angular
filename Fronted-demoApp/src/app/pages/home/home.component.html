<div class="layout-wrapper">

  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <h5 class="logo-text" *ngIf="!sidebarCollapsed">Angular & Spring</h5>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <i class="bi" [ngClass]="sidebarCollapsed ? 'bi-list' : 'bi-x-lg'"> --</i>
      </button>
    </div>

    

    <ul class="nav flex-column sidebar-menu">

      <li class="nav-item">
        <a
          class="nav-link"
          routerLink="/home/inicio"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }">
          <i class="bi bi-house-door-fill"></i>
          <span *ngIf="!sidebarCollapsed">Inicio</span>
        </a>
      </li>

      <li class="nav-item">
        <a
          class="nav-link"
          routerLink="/home/usuarios"
          routerLinkActive="active">
          <i class="bi bi-people-fill"></i>
          <span *ngIf="!sidebarCollapsed">Usuarios</span>
        </a>
      </li>

    </ul>
  </aside>

  <div class="main-content">
    <nav class="top-navbar navbar navbar-expand-lg bg-body-tertiary px-3">
  <div class="container-fluid p-0 d-flex align-items-center">

    <!-- 🔵 IZQUIERDA -->
    <div class="d-flex gap-3">
      <h5>Sistema de Login y registro </h5>
    </div>

    <!-- 🔴 DERECHA -->
    <div class="d-flex align-items-center gap-3 ms-auto">
      <span class="navbar-text">
        Bienvenido {{ nombreUsuario }}
      </span>

      <button class="btn btn-danger" (click)="logout()">
        Salir
      </button>
    </div>

  </div>
</nav>

    <div class="page-content">
      <div class="container mt-4 mb-4">
        <router-outlet></router-outlet>
      </div>
    </div>

    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">© 2026 Mi Sitio Web - Desarrollado por Marco Vinicio Sánchez</p>
    </footer>
  </div>

</div>
